spring.application.name=product-core

# MySQL configuration template - replace placeholders or use a profile-specific file (application-dev.properties)
# Uncomment and set values to enable MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:8889/productdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

Example to enable profile-based config:
spring.profiles.active=dev
